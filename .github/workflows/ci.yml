# CI Workflow Template for Python
# This is a template for GitHub Actions CI/CD workflows for Python projects.
# Copy this file to ci.yml and customize it for your project's needs.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if [ -f pyproject.toml ]; then pytest --maxfail=1 --disable-warnings -q; else pytest --maxfail=1 --disable-warnings -q; fi

      - name: Check formatting
        run: |
          if command -v black >/dev/null 2>&1; then black --check .; fi

      - name: Check linting
        run: |
          if command -v flake8 >/dev/null 2>&1; then flake8 .; fi
